<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>

    <section id="timer_settings">
    <!-- Section,two divs?, top and bottom, 3 more spans?, article for time, img,  -->
    <div id="setting_overview" class="flex-row">
        <article id="date">
            <h3>9:02 AM</h3>
            <p>April 20, Mon</p>
        </article>
        <img src="/assets/apple.png" alt="apple">
        <p id="start-time">25:00</p>
    </div>

    <div id="setting_controls" class="flex-row">
        <span class="flex-row">
            <h3>Pomodoros</h3>
            <input type="button" value="-">
            <p>4</p>
            <input type="button" value="+">
        </span>

        <span class="flex-row">
            <h3>Session length</h3>
            <input type="button" value="-">
            <p>25</p>
            <input type="button" value="+">
        </span>

        <span class="flex-row">
            <h3>Break length</h3>
            <input type="button" value="-">
            <p>5</p>
            <input type="button" value="+">
        </span>
    </div>
</section>


</body>
</html>
