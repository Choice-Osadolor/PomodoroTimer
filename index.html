<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<link rel="icon" type="assets/pomodoro_timer.png" href="assets/pomodoro_timer.png">
</head>
<body>
<main>

        <section id="mainDisplay" class="flex-row">
          <nav class="flex-row">
              <button id="settings-btn">Settings</button>
              <button id="restart-btn">Restart</button>
              <svg class="icons"  id="play-btn" class="icons" xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 20 20"><path fill="#7F8330" d="M4.55 19A1 1 0 0 1 3 18.13V1.87A1 1 0 0 1 4.55 1l12.2 8.13a1 1 0 0 1 0 1.7z"/></svg> -->
              <svg class="icons" id="pause-btn" class="icons" width="80" height="80" viewBox="0 0 114 106" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M66.5 83.9167V22.0833H85.5V83.9167H66.5ZM28.5 83.9167V22.0833H47.5V83.9167H28.5Z" fill="#7F8330"/></svg>
          </nav>

        <div  id="pomodoro-container" class="flex-column">
          <img id="pomodoro" src="assets/tomato.png" alt="pomodoro timer">
        </div>

        <div id="session-timer" class="flex-column">
             <h1 id="session_name">Pomodoro</h1>   
            <time id="session_timer"> 00 : 00</time>     
        </div>
        
        <button id="start-btn">Start</button>
        </section>

    <section id="timer_settings">
    <!-- Section,two divs?, top and bottom, 3 more spans?, article for time, img,  -->
    <div id="setting_overview" class="flex-row">
        <article id="date">
            <h3>9:02 AM</h3>
            <p>April 20, Mon</p>
        </article>
        <img src="/assets/apple.png" alt="apple">
        <p id="start-time">25:00</p>
    </div>

    <div id="setting_controls" class="flex-row">
        <span class="flex-row">
            <h3>Pomodoros</h3>
            <button>-</button>
            <p>4</p>
            <button>+</button>
        </span>

        <span class="flex-row">
            <h3>Session length</h3>
          <button>-</button>
            <div class="flex-row" style="flex-wrap: nowrap;">
              <p id="minuteInput">25</p>
              <p>:</p>
              <p id="secondInput">00</p>  
            </div>
          <button>+</button>
        </span>

        <span class="flex-row">
            <h3>Break length</h3>
          <button>-</button>
            <div class="flex-row" style="flex-wrap: nowrap;">
              <p id="minuteInput_break">05</p>
              <p>:</p>
              <p id="secondInput_break">00</p>  
            </div>
          <button>+</button>
        </span>
    </div>
</section>

</main>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="scripts/script.js"></script>
    <script src="animations.js"></script>
</body>
</html>
